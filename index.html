<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Ludo Nexus — Multiplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ░░ AMBIENT BACKGROUND ░░ -->
<div class="ambient-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grain"></div>
</div>

<!-- ░░ SCREEN: LOBBY ░░ -->
<div id="screen-lobby" class="screen active">
  <div class="lobby-wrap">

    <header class="brand">
      <div class="brand-gem">
        <svg viewBox="0 0 40 40" fill="none"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="currentColor" stroke-width="2"/><polygon points="20,8 32,15 32,25 20,32 8,25 8,15" fill="currentColor" opacity="0.15"/><circle cx="20" cy="20" r="4" fill="currentColor"/></svg>
      </div>
      <div class="brand-text">
        <h1>LUDO <span>NEXUS</span></h1>
        <p>REAL-TIME MULTIPLAYER</p>
      </div>
    </header>

    <div class="lobby-card glass-card">
      <div class="tab-row">
        <button class="tab active" data-tab="create">Create Room</button>
        <button class="tab" data-tab="join">Join Room</button>
      </div>

      <div id="tab-create" class="tab-pane active">
        <div class="field">
          <label>Your Name</label>
          <input id="create-name" type="text" placeholder="Enter your name" maxlength="16" autocomplete="off"/>
        </div>
        <div class="field">
          <label>Number of Players</label>
          <div class="pill-group">
            <button class="pill" data-count="2">2 Players</button>
            <button class="pill active" data-count="3">3 Players</button>
            <button class="pill" data-count="4">4 Players</button>
          </div>
        </div>
        <button class="btn-primary" id="create-btn">
          <span class="btn-icon">＋</span> Create Room
        </button>
      </div>

      <div id="tab-join" class="tab-pane">
        <div class="field">
          <label>Your Name</label>
          <input id="join-name" type="text" placeholder="Enter your name" maxlength="16" autocomplete="off"/>
        </div>
        <div class="field">
          <label>Room Code</label>
          <input id="join-code" type="text" placeholder="A B C 1 2 3" maxlength="6" autocomplete="off" class="code-input"/>
        </div>
        <button class="btn-primary" id="join-btn">
          <span class="btn-icon">→</span> Join Room
        </button>
      </div>

      <div id="lobby-error" class="error-strip"></div>
    </div>

    <div class="lobby-footer">Each hexagon, one battlefield.</div>
  </div>
</div>

<!-- ░░ SCREEN: WAITING ░░ -->
<div id="screen-waiting" class="screen">
  <div class="waiting-wrap">
    <h2 class="section-label">Waiting Room</h2>

    <div class="code-card glass-card">
      <div class="code-label">Room Code</div>
      <div class="code-big" id="display-code">——————</div>
      <button class="btn-ghost small" id="copy-btn">⧉ Copy</button>
    </div>

    <div class="players-grid" id="players-grid"></div>

    <p class="wait-hint" id="wait-hint">Waiting for players…</p>

    <button class="btn-primary" id="start-btn" style="display:none">Start Game</button>
    <button class="btn-ghost" id="leave-waiting-btn">Leave Room</button>
  </div>
</div>

<!-- ░░ SCREEN: GAME ░░ -->
<div id="screen-game" class="screen">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-left">
      <div class="top-room-code">
        <span class="trc-label">ROOM</span>
        <span class="trc-val" id="hud-code">——</span>
      </div>
    </div>
    <div class="top-brand">LUDO<span>NEXUS</span></div>
    <div class="top-right">
      <button class="btn-ghost tiny" id="quit-btn">Quit</button>
    </div>
  </div>

  <!-- Player strips -->
  <div class="player-strips" id="player-strips"></div>

  <!-- Game body -->
  <div class="game-body">

    <!-- Board -->
    <div class="board-shell" id="board-shell">
      <canvas id="game-canvas"></canvas>
      <!-- SVG token overlay for smooth animation -->
      <svg id="token-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- Right panel -->
    <aside class="game-panel">

      <!-- Turn card -->
      <div class="turn-card glass-card" id="turn-card">
        <div class="tc-orb" id="tc-orb"></div>
        <div class="tc-info">
          <div class="tc-label">Current Turn</div>
          <div class="tc-name" id="tc-name">—</div>
        </div>
        <div class="tc-badge" id="tc-badge">YOU</div>
      </div>

      <!-- Dice -->
      <div class="dice-card glass-card">
        <div class="dice-stage">
          <div class="dice-wrap" id="dice-wrap">
            <div class="die" id="die">
              <div class="die-face f1"><i></i></div>
              <div class="die-face f2"><i></i><i></i></div>
              <div class="die-face f3"><i></i><i></i><i></i></div>
              <div class="die-face f4"><i></i><i></i><i></i><i></i></div>
              <div class="die-face f5"><i></i><i></i><i></i><i></i><i></i></div>
              <div class="die-face f6"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            </div>
          </div>
        </div>
        <button class="btn-roll" id="roll-btn" disabled>
          <span>Roll Dice</span>
        </button>
        <div class="dice-msg" id="dice-msg"></div>
      </div>

      <!-- Log -->
      <div class="log-card glass-card">
        <div class="log-head">Game Log</div>
        <ul class="log-list" id="log-list"></ul>
      </div>
    </aside>
  </div>
</div>

<!-- ░░ WINNER MODAL ░░ -->
<div id="winner-modal" class="modal-backdrop hidden">
  <div class="modal-box glass-card">
    <div class="confetti-burst" id="confetti-burst"></div>
    <div class="modal-trophy">🏆</div>
    <div class="modal-eyebrow">Victory!</div>
    <div class="modal-winner" id="modal-winner-name">—</div>
    <div class="modal-sub">conquered the board!</div>
    <button class="btn-primary" id="play-again-btn">Play Again</button>
  </div>
</div>

<!-- ░░ TOAST ░░ -->
<div id="toast" class="toast"></div>

<!-- Audio -->
<audio id="sfx-roll"   src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" preload="auto"></audio>
<audio id="sfx-move"   src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" preload="auto"></audio>
<audio id="sfx-kill"   src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" preload="auto"></audio>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="./script.js"></script>

</body>
</html>
